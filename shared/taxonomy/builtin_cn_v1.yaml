# PlotPilot 内置 taxonomy — 以本 YAML 为权威源；勿手改 frontend 下的 bundle.json
# 修改后执行: npm run sync:taxonomy（dev/build 前会自动跑）
schema_kind: plotpilot.taxonomy_bundle
schema_version: 1
id: builtin_cn_v1
locale: zh-CN
domain: webnovel_market_cn
title: 中文网文大类 / 主题 / 赛道
description: 通用节点树：父级挂 facets（可变维度键）；子节点仅语义标签；引擎路由用 facets.theme_agent_key。
facet_keys_semantics:
  market_track: 平台常用赛道简述（可作提示词补强）
  world_tone: 世界观基调正文（写入 world_preset；优先使用子主题配置）
  writing_profile: 结构化写作规则对象，含 story_structure / pacing_control / writing_style / special_requirements；父级给默认值，子主题可局部覆盖
  theme_agent_key: 与 Theme Agent registry 对齐的体裁键
  search_blob: 供前端本地模糊搜索的合成串（可选冗余）
roots:
  - id: xuanhuan
    labels:
      zh-CN: 玄幻
    facets:
      market_track: 男频核心爽文主赛道
      world_tone: 东方修真 / 异能体系，强者为尊，以升级流为核心，多为架空大世界，有明确的境界等级划分，核心脉络为逆天改命、登顶世界之巅
      theme_agent_key: xuanhuan
      search_blob: 玄幻 修真 异能 境界 升级
      writing_profile:
        story_structure: 开篇到结尾都要围绕主角必须有清晰长线目标：复仇、登顶、守护、改命或揭开身世。每一阶段都要设置更高层级的敌人、资源和势力门槛推进，主线底层遵守以“弱到强、低到高、凡到神”为主线，所有设定服务实力跃迁与阶层突破。高潮必须兑现该题材的阶段性最大承诺，结尾完成当前卷收束并抛出更高层级矛盾。
        pacing_control: 小爽点放在修炼突破、获得资源、打脸小反派；中爽点放在越级战胜、秘境夺宝、宗门扬名；大爽点放在境界碾压、身份揭露、势力洗牌。升级线不可断，世界地图要逐层打开，避免长时间日常停滞
        writing_style: 叙事强调强目标、强反馈和层级压迫；环境描写突出宗门、秘境、王朝与能量威势；人物对话要体现强者话语权、资源差与宿敌锋芒。
        special_requirements: 人物关系围绕师徒、宗门、家族、红颜、宿敌展开，反派要代表更高阶层压迫。境界、功法、血脉、神器不能只堆名词，必须对应可见战力差异和剧情代价
    children:
      - id: xuanhuan.dongfang
        labels:
          zh-CN: 东方玄幻
        facets:
          world_tone: 东方宗门、王朝、血脉与秘境体系并行，强调传承争夺、家族荣辱与逆天登阶，力量秩序森严且具中式神话质感。
          writing_profile:
            story_structure: 开篇从宗门、家族或王朝压制切入，发展围绕传承争夺、秘境历练与势力晋阶推进，高潮落在跨阶反杀或身世揭露，结尾抛出更高宗门或上界矛盾。
      - id: xuanhuan.yishi
        labels:
          zh-CN: 异世大陆
        facets:
          world_tone: 陌生大陆由帝国、种族、神殿或学院共同构成，职业、血脉与异能混合成长，核心看点是异域探索、文明碰撞和领地扩张。
          writing_profile:
            story_structure: 开篇让主角在异大陆失去依靠或被迫站队，发展围绕冒险升级、阵营博弈和新地图探索展开，高潮兑现异域大战或文明秘密揭露，结尾推向更大版图。
      - id: xuanhuan.gaowu
        labels:
          zh-CN: 高武世界
        facets:
          world_tone: 灵气复苏或武道现代化背景下，城市、防线、武考、军团与裂隙并存，实力等级公开映射社会阶层，核心冲突来自生存防卫与强者竞争。
          writing_profile:
            story_structure: 开篇用武考、异境入侵或底层少年受压迫切入，发展围绕资源竞争、军校成长和裂隙任务推进，高潮落在守城大战或战力破阶，结尾把主角送入更高战场。
      - id: xuanhuan.naodong
        labels:
          zh-CN: 玄幻脑洞
        facets:
          world_tone: 以反套路金手指、概念级规则或异常系统为核心驱动，世界可宏大但必须围绕脑洞规则自洽运转，冲突来自设定反差与规则翻盘。
          writing_profile:
            story_structure: 开篇直接抛出异常设定或离谱能力，发展围绕规则试错、反向利用和世界观扩容推进，高潮要让脑洞规则完成一次大型反杀，结尾抛出更高维规则谜团。
  - id: qihuan
    labels:
      zh-CN: 奇幻
    facets:
      market_track: 西幻 / 泛幻想赛道
      world_tone: 西式魔法 / 神话体系，多为中世纪背景或现代魔改世界观，有明确的职业 / 魔法等级，以阵营对抗、冒险成长为核心主线
      theme_agent_key: fantasy
      search_blob: 奇幻 西幻 剑与魔法
      writing_profile:
        story_structure: 开篇到结尾都要围绕冒险任务、王国危机、神明阴谋、种族战争或职业晋升推进，主线底层遵守以职业体系、阵营冲突、冒险探索和世界秘密驱动剧情。高潮必须兑现该题材的阶段性最大承诺，结尾完成当前卷收束并抛出更高层级矛盾。
        pacing_control: 小爽点来自技能解锁、队友配合、发现宝物；中爽点来自副本通关、阵营反转、职业进阶；大爽点来自击败领主级敌人、改变战争局势或揭开神话真相。节奏以任务链推进，冒险、休整、危机、奖励循环要清楚
        writing_style: 叙事以任务推进和世界秘密揭示并行；环境描写重种族、城邦、遗迹和魔法工业质感；人物对话区分职业、阵营和文化背景。
        special_requirements: 团队成员要有互补能力和冲突立场，避免所有角色只为主角捧场。魔法、职业、种族设定要有规则边界，不能随意开挂破坏可信度
    children:
      - id: qihuan.lishi
        labels:
          zh-CN: 历史神话
        facets:
          world_tone: 以古代神话、失落王朝和神明谱系为背景，英雄史诗与神权秩序并存，强调传说复苏、神性代价和历史秘密重启。
          writing_profile:
            story_structure: 开篇从神话遗物、王国旧案或神谕失控切入，发展围绕史诗任务、神明博弈和古老真相推进，高潮落在弑神、封神或王朝改命，结尾抛出更深远的神话债务。
      - id: qihuan.alternative
        labels:
          zh-CN: 另类幻想
        facets:
          world_tone: 采用非标准种族、异类文明或反常魔法逻辑构成世界，重视陌生感、文化差异和非常规秩序，冲突不走典型王道模板。
          writing_profile:
            story_structure: 开篇从异类身份困境或非常规规则切入，发展围绕陌生文明接触、阵营冲突和身份暴露推进，高潮要让异类设定成为破局钥匙，结尾扩展更大的世界异质性。
      - id: qihuan.modern_magic
        labels:
          zh-CN: 现代魔法
        facets:
          world_tone: 现代都市表层秩序下隐藏魔法社群、学院、结社或禁忌遗产，科技与神秘并存，冲突来自双重社会与隐秘规则碰撞。
          writing_profile:
            story_structure: 开篇用普通生活中的魔法事故或觉醒事件切入，发展围绕隐秘社群、学院训练和现实掩护推进，高潮落在公开危机或结社大战，结尾保留更深层魔法世界入口。
      - id: qihuan.sword_spell
        labels:
          zh-CN: 剑与魔法
        facets:
          world_tone: 王国、骑士、法师塔、教会与地下遗迹共同构成经典西幻版图，职业分工清晰，主冲突来自冒险、战争与神秘遗产争夺。
          writing_profile:
            story_structure: 开篇以任务委托、村镇危机或学院试炼切入，发展围绕组队冒险、职业进阶和阵营对抗推进，高潮落在领主级敌人或王国危机决战，结尾引出更古老的遗迹真相。
      - id: qihuan.steampunk
        labels:
          zh-CN: 蒸汽朋克
        facets:
          world_tone: 蒸汽机械、齿轮工业、贵族资本和超凡技术并行，城市雾霾与阶级鸿沟显著，冲突来自工业革命、技术垄断和旧神秘残响。
          writing_profile:
            story_structure: 开篇从事故发明、工坊危机或阶层压迫切入，发展围绕机械升级、城市阴谋和势力渗透推进，高潮落在机械战争或能源秘密爆发，结尾抛出帝国级工业冲突。
  - id: wuxia
    labels:
      zh-CN: 武侠
    facets:
      market_track: 国风武侠赛道
      world_tone: 中式江湖 / 武林体系，有明确的门派 / 武功等级，分传统低武、近代国术、现代高武三大分支，核心围绕家国江湖、侠义恩仇展开
      theme_agent_key: wuxia
      search_blob: 武侠 江湖 门派 国术
      writing_profile:
        story_structure: 开篇到结尾都要围绕主线可围绕血案追查、门派纷争、武林盟主、家国危局或个人洗冤推进，主线底层遵守以江湖秩序、侠义抉择、门派恩怨和个人武道信念为核心。高潮必须兑现该题材的阶段性最大承诺，结尾完成当前卷收束并抛出更高层级矛盾。
        pacing_control: 小爽点来自招式精进、仗义出手、识破阴谋；中爽点来自门派比武、江湖扬名、旧案反转；大爽点来自决战宗师、平息武林乱局或完成侠义抉择。节奏重在“行走江湖遇事破局”，每个地点都应带出人物、恩怨或线索
        writing_style: 叙事重因果、恩怨和选择代价；环境描写突出客栈、山门、渡口、城镇与江湖风尘；人物对话要有身份规矩、江湖礼数和刀锋感。
        special_requirements: 人物关系要有恩义、师承、知己、宿敌和江湖规矩压迫。武力不是唯一答案，侠义选择、名声代价和江湖人情必须影响剧情
    children:
      - id: wuxia.chuantong
        labels:
          zh-CN: 传统武侠
        facets:
          world_tone: 低武或中武江湖秩序稳定存在，门派、镖局、帮会、朝廷与绿林彼此牵制，核心是侠义选择、恩仇旧案与江湖名望。
          writing_profile:
            story_structure: 开篇从血案、师门变故或路见不平切入，发展围绕行走江湖、查案寻仇和门派恩怨推进，高潮落在名宿决战或旧案反转，结尾留下更大江湖局势。
      - id: wuxia.gaowu
        labels:
          zh-CN: 高武武侠
        facets:
          world_tone: 高烈度武道体系覆盖江湖与朝堂，武者可撼城破军，门阀、宗派和国家机器共同掌握武力秩序，冲突更偏争霸与破局。
          writing_profile:
            story_structure: 开篇从强敌压境、宗门竞争或朝廷征调切入，发展围绕武学跃迁、势力站队和大战前哨推进，高潮落在顶级高手对决或城战破局，结尾将江湖推向天下大势。
      - id: wuxia.guoshu
        labels:
          zh-CN: 国术武侠
        facets:
          world_tone: 近现代城市与乱世背景下，国术门派、帮会、军阀与租界秩序交错，拳法不仅是技艺也是身份与民族气节的体现。
          writing_profile:
            story_structure: 开篇从馆斗、仇杀或家国危机切入，发展围绕踢馆成长、暗战调查和时代风云推进，高潮落在擂台决生死或民族立场抉择，结尾抛出更广阔的时代战局。
      - id: wuxia.tianyuan
        labels:
          zh-CN: 武侠种田
        facets:
          world_tone: 江湖规矩与乡野经营并行，门派、村镇、商路和地方豪强互相影响，冲突更重守家业、护乡里与慢热式扩张。
          writing_profile:
            story_structure: 开篇从守村、守铺或避祸隐居切入，发展围绕产业经营、江湖来客和地方势力试探推进，高潮落在护家大战或身份暴露，结尾留出更大江湖牵连。
  - id: xianxia
    labels:
      zh-CN: 仙侠
    facets:
      market_track: 男频核心仙侠主赛道
      world_tone: 东方修仙体系，以三界六道、天道法则为核心框架，有明确的修仙境界划分，核心脉络为逆天改命、长生问道、勘破天道
      theme_agent_key: xianxia
      search_blob: 仙侠 修仙 修真 天道
      writing_profile:
        story_structure: 开篇到结尾都要围绕主线应从个人修行扩展到宗门、秘境、仙界、天道或纪元级矛盾推进，主线底层遵守以长生、问道、逆天改命和天道规则对抗为核心。高潮必须兑现该题材的阶段性最大承诺，结尾完成当前卷收束并抛出更高层级矛盾。
        pacing_control: 小爽点来自突破、炼丹炼器、获得传承；中爽点来自秘境争锋、宗门晋升、越阶斩敌；大爽点来自渡劫成功、逆转天命、改写天地规则。节奏要维持修炼、历练、争夺、闭关、出关破局的循环
        writing_style: 叙事要把修行阶段、因果牵引和天道压迫写清；环境描写突出灵山、秘境、洞府与仙门秩序；人物对话兼顾道心、利益和寿命视角。
        special_requirements: 人物关系围绕道侣、师门、宗族、因果、宿敌展开，情感要与修行选择绑定。修仙资源、境界寿命、因果誓言要自洽，避免“想突破就突破”
    children:
      - id: xianxia.gudian
        labels:
          zh-CN: 古典仙侠
        facets:
          world_tone: 山海神怪、三界六道、仙门道统与因果轮回并行，气质偏古典神话与大道修真，重宿命、道心与天道秩序。
          writing_profile:
            story_structure: 开篇从凡尘因果、仙缘初显或师门召引切入，发展围绕修行、历劫、问道和因果牵引推进，高潮落在渡劫破局或仙魔大战，结尾抛出更深层天道谜题。
      - id: xianxia.xiuzhen
        labels:
          zh-CN: 修仙修真
        facets:
          world_tone: 宗门、家族、坊市、秘境和上界构成标准修真文明，资源、寿命与境界绑定，主冲突来自争道、争命与争机缘。
          writing_profile:
            story_structure: 开篇从凡人入道、宗门底层或家族困局切入，发展围绕修炼突破、秘境争夺和宗门晋升推进，高潮落在越阶斩敌或大机缘争夺，结尾将主角推向更高界域。
      - id: xianxia.naodong
        labels:
          zh-CN: 仙侠脑洞
        facets:
          world_tone: 传统修仙框架上叠加系统、模拟器、面板、轮回或反套路规则，重点不在纯古典修真，而在脑洞规则与大道体系对撞。
          writing_profile:
            story_structure: 开篇直接抛出异常修仙机制，发展围绕规则试炼、另类修行和世界反转推进，高潮让脑洞机制改写修真秩序，结尾保留更高层法则悬念。
      - id: xianxia.tianyuan
        labels:
          zh-CN: 仙侠种田
        facets:
          world_tone: 修真世界中弱化纯杀伐，强化灵田、炼丹、洞府经营与家族积累，冲突更偏资源经营、护山护田与稳步扩张。
          writing_profile:
            story_structure: 开篇从守灵田、继承洞府或宗门外放切入，发展围绕种植炼丹、家族经营和局部争夺推进，高潮落在护山大战或灵脉归属，结尾抛出更高层修真博弈。
  - id: dushi
    labels:
      zh-CN: 都市
    facets:
      market_track: 都市全品类赛道（男女频核心赛道）
      world_tone: 基于现实现代社会魔改，分无异能纯现实生活流、带异能 / 重生 / 系统的脑洞流两大分支，贴近现实认知，代入感强，适配全题材创作
      theme_agent_key: dushi
      search_blob: 都市 现实 异能 重生 系统
      writing_profile:
        story_structure: 开篇到结尾都要围绕财富、事业、身份、情感、行业地位或现实危机推进，主线底层遵守以现实代入感叠加超常优势，核心是让读者看到熟悉社会中的逆袭和掌控感。高潮必须兑现该题材的阶段性最大承诺，结尾完成当前卷收束并抛出更高层级矛盾。
        pacing_control: 小爽点来自解决身边麻烦、展示能力、改善生活；中爽点来自事业突破、打脸权贵、关系升温；大爽点来自阶层跃迁、行业封神、身份曝光或全面翻盘。节奏要短平快，冲突和兑现频率高，避免大段设定解释
        writing_style: 叙事要短平快，优先处理现实冲突与能力兑现；环境描写抓行业场景、城市空间和阶层差；人物对话贴近现代语境，兼顾网感与身份差。
