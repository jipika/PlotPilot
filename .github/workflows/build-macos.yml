name: Build macOS

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: arm64
          - target: x86_64-apple-darwin
            arch: x64

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './frontend/src-tauri -> target'

      - name: Install system dependencies
        run: |
          brew install create-dmg

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Create Python venv and install dependencies
        run: |
          python -m venv .venv-nsis
          source .venv-nsis/bin/activate
          pip install -U pip
          pip install pyinstaller
          pip install -r requirements-nsis.txt

      - name: Build frozen backend (PyInstaller)
        run: |
          source .venv-nsis/bin/activate
          python scripts/build_macos_backend.py --force

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'PlotPilot macOS v__VERSION__'
          releaseBody: |
            ## PlotPilot macOS 版本
            
            ### 下载说明
            - **Apple Silicon (M1/M2/M3/M4)**: 下载 `PlotPilot_aarch64.app.dmg`
            - **Intel Mac**: 下载 `PlotPilot_x86_64.app.dmg`
            
            ### 安装方法
            1. 下载对应架构的 `.dmg` 文件
            2. 双击打开 DMG
            3. 将 PlotPilot 拖入 Applications 文件夹
            4. 首次打开可能需要在「系统设置 → 隐私与安全性」中允许运行
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: PlotPilot-macos-${{ matrix.arch }}
          path: |
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          retention-days: 30
