# PlotPilot Alembic 配置（新迁移请用 alembic revision，勿再手写编号 SQL）
[alembic]
script_location = infrastructure/persistence/alembic
prepend_sys_path = .
version_path_separator = os

sqlalchemy.url = sqlite:///data/plotpilot.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
